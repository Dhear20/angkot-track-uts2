name: Deploy to Amazon ECS

on:
  push:
    branches: [ "main" ] # Akan jalan otomatis saat kamu push ke branch main

env:
  AWS_REGION: us-east-1 
  ECR_REPOSITORY: angkot-track-repo
  ECS_SERVICE: angkot-service
  ECS_CLUSTER: angkot-cluster
  ECS_TASK_DEFINITION: task-definition.json
  CONTAINER_NAME: angkot-app

jobs:
  deploy:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Membangun image docker dengan tag dari commit SHA GitHub
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          # Mengirim image ke Amazon ECR
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          # Menyimpan output lokasi image untuk tahap deployment selanjutnya
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT