<!DOCTYPE html>
<html>
<head>
    <title>AngkotTrack - Cloud Integrated</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f4f4f9; }
        .card { border: 1px solid #ccc; padding: 20px; display: inline-block; border-radius: 10px; background: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #ff9900; }
        .status { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>AngkotTrack Deployment Success!</h1>
        <p>Aplikasi monitoring angkot Bandung berbasis Cloud.</p>
        <hr>
        <p>Status Infrastruktur:</p>
        <ul style="list-style: none; padding: 0;">
            <li>✅ AWS RDS (Database) - <b>Connected</b></li>
            <li>✅ AWS ECR (Docker Registry) - <b>Pushed</b></li>
            <li>✅ GitHub Actions (CI/CD) - <b>Success</b></li>
            <li>✅ Cloudflare (CDN) - <b>Active</b></li>
        </ul>
        <p class="status">Sistem siap dipresentasikan!</p>
    </div>
</body>
</html>
